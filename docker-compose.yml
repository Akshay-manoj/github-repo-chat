version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: github-chat-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: github_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: github-chat-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
