[build]
  base = "./apps/api"
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@nestjs/microservices", "@nestjs/websockets", "class-validator", "class-transformer"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
